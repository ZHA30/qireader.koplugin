      parameters:
      - "$ref": "#/components/parameters/ApiVersionHeader"
      responses:
        '200':
          "$ref": "#/components/responses/NoContentJsonNull"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
              - type: object
                properties:
                  type:
                    const: entries
                  entryIds:
                    type: array
                    items:
                      type: string
                required:
                - type
                - entryIds
              - type: object
                properties:
                  type:
                    const: category
                  categoryId:
                    type: string
                  asOf:
                    type: string
                required:
                - type
                - categoryId
                - asOf
              - type: object
                properties:
                  type:
                    const: subscription
                  subscriptionId:
                    type: string
                  asOf:
                    type: string
                required:
                - type
                - subscriptionId
                - asOf
            example:
              type: entries
              entryIds:
              - entry-id
