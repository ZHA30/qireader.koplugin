---
openapi: 3.1.0
info:
  title: QiReader API
  version: 21.0.0
  description: Observed from https://www.qireader.com on 2026-06-13. Use /api/*; direct /_api/* requests return the frontend application HTML. Safe authenticated probes were re-run on 2026-06-13.
servers:
- url: https://www.qireader.com/api
security:
- sessionCookie: []
tags:
- name: Protocol
- name: Session
- name: Subscriptions
- name: Categories
- name: Tags
- name: Feeds
- name: Discovery
- name: Reading
- name: Preferences
- name: Ebook
- name: Feedback
components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: qireader_auth
      description: POST /session sets qireader_auth, qireader_auth.sig, qireader_user_id, and qireader_user_id.sig cookies.
    apiVersionHeader:
      type: apiKey
      in: header
      name: x-api-version
      description: Observed frontend header. GET /versions accepted requests with and without this header during probing.
  parameters:
    ApiVersionHeader:
      name: x-api-version
      in: header
      required: true
      schema:
        type: string
        example: 21.0.0
    SubscriptionId:
      name: subscriptionId
      in: path
      required: true
      schema:
        type: string
    CategoryId:
      name: categoryId
      in: path
      required: true
      schema:
        type: string
    TagId:
      name: tagId
      in: path
      required: true
      schema:
        type: string
    EntryId:
      name: entryId
      in: path
      required: true
      schema:
        type: string
    StreamId:
      name: streamId
      in: path
      required: true
      schema:
        type: string
        pattern: "^(category|subscription|feed|tag)-.+$"
    FeedId:
      name: id
      in: path
      required: true
      schema:
        type: string
    FeedSet:
      name: feedSet
      in: path
      required: true
      schema:
        type: string
        example: en
    ItemId:
      name: itemId
      in: path
      required: true
      schema:
        type: string
        pattern: "^(category|subscription|feed|tag)-.+$"
    EntryType:
      name: entryType
      in: path
      required: true
      schema:
        type: string
        enum:
        - feed
        - saved
  schemas:
    Envelope:
      type: object
      properties:
        result: {}
      required:
      - result
    User:
      type: object
      properties:
        id:
          type: string
        displayName:
          type: string
        email:
          type: string
          format: email
        timezoneOffset:
          type: integer
        plan:
          type: integer
        isDemo:
          type: boolean
        ebookSendTo:
          type: string
        ebookLanguage:
          type: string
        ebookKeepLinks:
          type: boolean
        ebookAppendQrCode:
          type: boolean
        ebookAutoSendEnabled:
          type: boolean
        ebookAutoSendInterval:
          type: integer
        ebookAutoSendHour:
          type: integer
        ebookAutoSendLastSentAt:
          type:
          - integer
          - 'null'
          format: int64
        ebookAutoSendMaxArticles:
          type: integer
        ebookAutoSendMinArticles:
          type: integer
        ebookNetDiskUrl:
          type:
          - string
          - 'null'
        ebookNumSent:
          type: integer
        ebookSendFrom:
          type:
          - string
          - 'null'
        isPlanCancelled:
          type: boolean
        payMethod:
          type:
          - string
          - 'null'
        planEndedAt:
          type:
          - integer
          - 'null'
          format: int64
    Feed:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        feedUrl:
          type: string
          format: uri
        homePageUrl:
          type: string
          format: uri
        language:
          type: string
        description:
          type: string
    Subscription:
      allOf:
      - "$ref": "#/components/schemas/Feed"
      - type: object
        properties:
          feedId:
            type: string
          originalTitle:
            type: string
    Category:
      type: object
      properties:
        id:
          type: string
        label:
          type: string
    Tag:
      type: object
      properties:
        id:
          type: string
        label:
          type: string
    FeedState:
      type: object
      properties:
        id:
          type: string
        supportsEmbedding:
          type: boolean
        inactive:
          type: boolean
        isPartial:
          type: boolean
        hasErrors:
          type: boolean
        velocity:
          type: number
        lastUpdatedAt:
          type: integer
          format: int64
        lastCheckedAt:
          type: integer
          format: int64
        nextCheckAt:
          type: integer
          format: int64
        errorCount:
          type: integer
    Entry:
      type: object
      properties:
        id:
          type: string
        origin:
          type: object
          properties:
            feedId:
              type: string
        status:
          type: integer
          enum:
          - 0
          - 1
          description: 0 unread, 1 read
        title:
          type: string
        summary:
          type: string
        thumbnail:
          type:
          - string
          - 'null'
        url:
          type: string
          format: uri
        publishedAt:
          type: integer
          format: int64
        updatedAt:
          type:
          - integer
          - 'null'
          format: int64
        crawledAt:
          type: integer
          format: int64
        timestamp:
          type: string
        attachments:
          type: array
          items: {}
        tagIds:
          type: array
          items:
            type: string
        content:
          type:
          - string
          - 'null'
        isSaved:
          type: boolean
    StreamObject:
      type: object
      properties:
        type:
          type: string
          enum:
          - CATEGORY
          - SUBSCRIPTION
          - FEED
          - TAG
        id:
          type: string
      required:
      - type
      - id
    OpmlItem:
      type: object
      properties:
        text:
          type: string
        url:
          type: string
          format: uri
        categories:
          type: array
          items:
            type: string
  responses:
    Unauthorized:
      description: Unauthorized
    BadRequest:
      description: Bad request
    NotFoundOrBad:
      description: NOT_FOUND_OR_BAD
    InternalServerError:
      description: Internal Server Error
    NoContentJsonNull:
      description: Successful mutation returning JSON null
      content:
        application/json:
          schema:
            type: 'null'
          example: 
paths:
  "/session":
    post:
      summary: Login
      tags:
      - Session
      parameters:
      - "$ref": "#/components/parameters/ApiVersionHeader"
      responses:
        '200':
          description: Authenticated
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    "$ref": "#/components/schemas/User"
                required:
                - result
              example:
                result:
                  id: user-id
                  displayName: name
                  email: user@example.com
                  timezoneOffset: -480
                  plan: 1
                  isDemo: false
                  ebookKeepLinks: true
                  ebookAppendQrCode: false
                  ebookAutoSendEnabled: false
                  ebookAutoSendHour: 23
                  ebookAutoSendInterval: 1
                  ebookAutoSendMaxArticles: 300
                  ebookAutoSendMinArticles: 1
                  ebookLanguage: zh-CN
                  ebookNumSent: 0
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - email
              - password
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
            example:
              email: user@example.com
              password: password
    delete:
      summary: Logout
      tags:
      - Session
      parameters:
      - "$ref": "#/components/parameters/ApiVersionHeader"
      responses:
        '200':
          description: Logged out
  "/session/user":
    get:
      summary: Current user
      tags:
      - Session
      parameters:
      - "$ref": "#/components/parameters/ApiVersionHeader"
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    "$ref": "#/components/schemas/User"
                required:
                - result
              example:
                result:
                  id: user-id
                  displayName: name
                  email: user@example.com
                  timezoneOffset: -480
                  plan: 1
                  isDemo: false
                  ebookSendTo: kindle@example.com
                  ebookLanguage: zh-CN
                  ebookKeepLinks: true
                  ebookAppendQrCode: false
                  ebookAutoSendEnabled: false
                  ebookAutoSendHour: 23
                  ebookAutoSendInterval: 1
                  ebookAutoSendMaxArticles: 300
                  ebookAutoSendMinArticles: 1
        '401':
          "$ref": "#/components/responses/Unauthorized"
    post:
      summary: Update user
      tags:
      - Session
      parameters:
      - "$ref": "#/components/parameters/ApiVersionHeader"
      responses:
        '200':
          description: Updated user
        '400':
          description: EMAIL_EXISTS, INVALID_EMAIL, or INVALID_PASSWORD
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
            example:
              displayName: name
              email: user@example.com
    delete:
      summary: Delete user
      tags:
      - Session
      parameters:
      - "$ref": "#/components/parameters/ApiVersionHeader"
      responses:
        '200':
          description: Deleted user
  "/users":
    post:
      summary: Register
      tags:
      - Session
      parameters:
      - "$ref": "#/components/parameters/ApiVersionHeader"
      - name: x-qi-api-verify
        in: header
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Registered
        '400':
          description: EMAIL_EXISTS, INVALID_EMAIL, or INVALID_PASSWORD
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - email
              - password
              - timezoneOffset
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
                timezoneOffset:
                  type: integer
            example:
              email: user@example.com
              password: password
              timezoneOffset: -480
  "/demo":
    post:
      summary: Create demo account
      tags:
      - Session
      parameters:
      - "$ref": "#/components/parameters/ApiVersionHeader"
      responses:
        '200':
          description: Created demo account
      security: []
      requestBody:
        required: true
        content:
          application/json:
            example:
              clientId: '12345678'
              timezoneOffset: -480
  "/session/code":
    post:
      summary: Login with code
      tags:
      - Session
      parameters:
      - "$ref": "#/components/parameters/ApiVersionHeader"
      responses:
        '200':
          description: Authenticated
        '400':
          description: INCORRECT_CODE
      security: []
      requestBody:
        required: true
        content:
          application/json:
            example:
              code: '123456'
  "/session/user/reset-password":
    post:
      summary: Request password reset code
      tags:
      - Session
      parameters:
      - "$ref": "#/components/parameters/ApiVersionHeader"
      responses:
        '200':
          description: Reset code requested
        '400':
          description: EMAIL_NOT_EXIST
      security: []
      requestBody:
        required: true
        content:
          application/json:
            example:
              email: user@example.com
  "/session/redeem":
    post:
      summary: Redeem code
      tags:
      - Session
      parameters:
      - "$ref": "#/components/parameters/ApiVersionHeader"
      responses:
        '200':
          description: Redeemed
        '400':
          description: USER_NOT_EXPIRED, INVALID_CODE, or BEEN_USED
      requestBody:
        required: true
        content:
          application/json:
            example:
              code: redeem-code
  "/versions":
    get:
      summary: Get data version counters
      tags:
      - Protocol
      parameters:
      - "$ref": "#/components/parameters/ApiVersionHeader"
      responses:
        '200':
          description: Version counters
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: object
                    properties:
                      subscriptions:
                        type: integer
                      preferences:
                        type: integer
                      tags:
                        type: integer
                required:
                - result
              example:
                result:
                  subscriptions: 10280
                  preferences: 2226
                  tags: 49
  "/subscriptions":
    get:
      summary: List subscriptions
      tags:
      - Subscriptions
      parameters:
      - "$ref": "#/components/parameters/ApiVersionHeader"
      responses:
        '200':
          description: Subscriptions, categories, and relations
          content:
            application/json:
              example:
                result:
                  version: 10280
                  subscriptions:
                  - id: subscription-id
                    title: Feed title
                    feedUrl: https://example.com/rss
                    homePageUrl: https://example.com
                    language: zh
                    description: description
                    feedId: feed-id
                    originalTitle: Original title
                  categories:
                  - id: category-id
                    label: "!all"
                  subscriptionCategories:
                  - id: relation-id
                    subscriptionId: subscription-id
                    categoryId: category-id
    post:
      summary: Add subscription
      tags:
      - Subscriptions
      parameters:
      - "$ref": "#/components/parameters/ApiVersionHeader"
      responses:
        '201':
          description: Created
          content:
            application/json:
              example:
                result:
                  subscription: {}
                  unreadCount: 0
                  feedState: {}
        '400':
          "$ref": "#/components/responses/BadRequest"
        '402':
          description: Plan limit exceeded
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
              - type: object
                required:
                - feedId
                properties:
                  feedId:
                    type: string
              - type: object
                required:
                - feedUrl
                properties:
                  feedUrl:
                    type: string
                    format: uri
            example:
              feedId: feed-id
  "/subscriptions/{subscriptionId}":
    post:
      summary: Modify subscription
      tags:
      - Subscriptions
      parameters:
      - "$ref": "#/components/parameters/ApiVersionHeader"
      - "$ref": "#/components/parameters/SubscriptionId"
      responses:
        '200':
          description: Modified
      requestBody:
        required: true
        content:
          application/json:
            example:
              subscriptionId: subscription-id
              title: New title
    delete:
      summary: Remove subscription
      tags:
      - Subscriptions
      parameters:
      - "$ref": "#/components/parameters/ApiVersionHeader"
      - "$ref": "#/components/parameters/SubscriptionId"
      responses:
        '200':
          description: Removed
  "/categories":
    post:
      summary: Create category
      tags:
      - Categories
      parameters:
      - "$ref": "#/components/parameters/ApiVersionHeader"
      responses:
        '200':
          description: Created
        '402':
          description: Max category count exceeded
      requestBody:
        required: true
        content:
          application/json:
            example:
              label: Category
  "/categories/{categoryId}":
    put:
      summary: Modify category
      tags:
      - Categories
      parameters:
      - "$ref": "#/components/parameters/ApiVersionHeader"
      - "$ref": "#/components/parameters/CategoryId"
      responses:
        '200':
          description: Modified
      requestBody:
        required: true
        content:
          application/json:
            example:
              categoryId: category-id
              label: Category
    delete:
      summary: Delete category
      tags:
      - Categories
      parameters:
      - "$ref": "#/components/parameters/ApiVersionHeader"
      - "$ref": "#/components/parameters/CategoryId"
      responses:
        '200':
          description: Deleted
  "/categories/{categoryId}/subscriptions/{subscriptionId}":
    put:
      summary: Add subscription to category
      tags:
      - Categories
      parameters:
      - "$ref": "#/components/parameters/ApiVersionHeader"
      - "$ref": "#/components/parameters/CategoryId"
      - "$ref": "#/components/parameters/SubscriptionId"
      responses:
        '200':
          description: Added
    delete:
      summary: Remove subscription from category
      tags:
      - Categories
      parameters:
      - "$ref": "#/components/parameters/ApiVersionHeader"
      - "$ref": "#/components/parameters/CategoryId"
      - "$ref": "#/components/parameters/SubscriptionId"
      responses:
        '200':
          description: Removed
  "/tags":
    get:
      summary: List tags
      tags:
      - Tags
      parameters:
      - "$ref": "#/components/parameters/ApiVersionHeader"
      responses:
        '200':
          description: Tags
          content:
            application/json:
              example:
                result:
                  version: 49
                  tags:
                  - id: tag-id
                    label: "!readlater"
    post:
      summary: Create tag
      tags:
      - Tags
      parameters:
      - "$ref": "#/components/parameters/ApiVersionHeader"
      responses:
        '201':
          description: Created
        '402':
          description: Max tag count exceeded
      requestBody:
        required: true
        content:
          application/json:
            example:
              label: Tag
  "/tags/{tagId}":
    put:
      summary: Modify tag
      tags:
      - Tags
      parameters:
      - "$ref": "#/components/parameters/ApiVersionHeader"
      - "$ref": "#/components/parameters/TagId"
      responses:
        '200':
          description: Modified
      requestBody:
        required: true
        content:
          application/json:
            example:
              tagId: tag-id
              label: Tag
    delete:
      summary: Delete tag
      tags:
      - Tags
      parameters:
      - "$ref": "#/components/parameters/ApiVersionHeader"
      - "$ref": "#/components/parameters/TagId"
      responses:
        '200':
          description: Deleted
  "/entries/{entryId}/tags/{tagId}":
    put:
      summary: Add tag to entry
      tags:
      - Tags
      parameters:
      - "$ref": "#/components/parameters/ApiVersionHeader"
      - "$ref": "#/components/parameters/EntryId"
      - "$ref": "#/components/parameters/TagId"
      responses:
        '200':
          description: Added
  "/entries/{entryType}/{entryId}/tags/{tagId}":
    delete:
      summary: Remove tag from entry
      tags:
      - Tags
      parameters:
      - "$ref": "#/components/parameters/ApiVersionHeader"
      - "$ref": "#/components/parameters/EntryType"
      - "$ref": "#/components/parameters/EntryId"
      - "$ref": "#/components/parameters/TagId"
      responses:
        '200':
          description: Removed
  "/feeds/{id}":
    get:
      summary: Get feed
      tags:
      - Feeds
      parameters:
      - "$ref": "#/components/parameters/ApiVersionHeader"
      - "$ref": "#/components/parameters/FeedId"
      responses:
        '200':
          description: Feed metadata
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    "$ref": "#/components/schemas/Feed"
                required:
                - result
              example:
                result:
                  id: feed-id
                  title: Feed title
                  feedUrl: https://example.com/rss
                  homePageUrl: https://example.com
                  language: zh
                  description: description
        '400':
          "$ref": "#/components/responses/NotFoundOrBad"
  "/feed-basic-states":
    get:
      summary: Get feed basic states
      tags:
      - Feeds
      parameters:
      - "$ref": "#/components/parameters/ApiVersionHeader"
      responses:
        '200':
          description: Basic states
          content:
            application/json:
              example:
                result:
                  feedStates:
                  - id: feed-id
                    supportsEmbedding: true
                    inactive: false
                    isPartial: false
                    hasErrors: false
  "/feed-state":
    get:
      summary: Get feed state
      tags:
      - Feeds
      parameters:
      - "$ref": "#/components/parameters/ApiVersionHeader"
      - name: id
        in: query
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Feed state
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    "$ref": "#/components/schemas/FeedState"
                required:
                - result
              example:
                result:
                  id: feed-id
                  supportsEmbedding: true
                  inactive: false
                  isPartial: false
                  hasErrors: false
                  velocity: 152.036
                  lastUpdatedAt: 1781324020000
                  lastCheckedAt: 1781349740000
                  nextCheckAt: 1781351540000
                  errorCount: 0
  "/feed-tags":
    get:
      summary: Get feed tags
      tags:
      - Feeds
      parameters:
      - "$ref": "#/components/parameters/ApiVersionHeader"
      - name: id
        in: query
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Feed tag statistics
          content:
            application/json:
              example:
                result:
                - label: All
                  localizedLabel: All
                  count: 2829
  "/search":
    get:
      summary: Search feeds
      tags:
      - Discovery
      parameters:
      - "$ref": "#/components/parameters/ApiVersionHeader"
      - name: query
        in: query
        schema:
          type: string
      - name: language
        in: query
        schema:
          type: string
      - name: lastUpdateDays
        in: query
        schema:
          type: integer
      - name: startIndex
        in: query
        schema:
          type: integer
      - name: limit
        in: query
        schema:
          type: integer
      responses:
        '200':
          description: Feed results or discovered links
          content:
            application/json:
              example:
                result:
                  feeds:
                  - feed:
                      id: feed-id
                      title: Feed title
                      feedUrl: https://example.com/rss
                      homePageUrl: https://example.com
                      language: zh
                      description: description
                    recentArticles:
                    - title: Article title
                      url: https://example.com/article
                    velocity: 35
                    lastUpdatedAt: 1781270164000
                  hasNextPage: true
  "/opml":
    post:
      summary: Parse OPML
      tags:
      - Discovery
      parameters:
      - "$ref": "#/components/parameters/ApiVersionHeader"
      responses:
        '200':
          description: Parsed OPML
          content:
            application/json:
              example:
                result:
                  items:
                  - text: Example
                    url: https://example.com/feed.xml
                    categories: []
      requestBody:
        required: true
        content:
          application/json:
            example:
              opml: <?xml version="1.0"?><opml version="1.0">...</opml>
  "/opml/featured/{feedSet}":
    get:
      summary: Featured OPML
      tags:
      - Discovery
      parameters:
      - "$ref": "#/components/parameters/ApiVersionHeader"
      - "$ref": "#/components/parameters/FeedSet"
      responses:
        '200':
          description: Featured OPML
          content:
            application/json:
              example:
                result:
                  items:
                  - text: Business Insider
                    url: https://feeds2.feedburner.com/businessinsider
                    categories:
                    - News
        '500':
          "$ref": "#/components/responses/InternalServerError"
      description: 'Observed working feedSet: en. Observed failing values zh, featured, default, tech, news returned 500.'
  "/markers/unread/counts":
    get:
      summary: Get unread counts
      tags:
      - Reading
      parameters:
      - "$ref": "#/components/parameters/ApiVersionHeader"
      responses:
        '200':
          description: Unread counts
          content:
            application/json:
              example:
                result:
                  unreadCounts:
                  - subscriptionId: subscription-id
                    count: 18
  "/streams/{streamId}":
    get:
      summary: Get stream
      tags:
      - Reading
      parameters:
      - "$ref": "#/components/parameters/ApiVersionHeader"
      - "$ref": "#/components/parameters/StreamId"
      - name: articleOrder
        in: query
        schema:
          type: integer
          enum:
          - 0
          - 1
      - name: unreadOnly
        in: query
        schema:
          type: boolean
      - name: count
        in: query
        schema:
          type: integer
      - name: olderThan
        in: query
        schema:
          type: string
      - name: newerThan
        in: query
        schema:
          type: string
      responses:
        '200':
          description: Entry stream
          content:
            application/json:
              example:
                result:
                  id: category-zdlLgBpbm7A3yWZ6
                  entries:
                  - id: entry-id
                    origin:
                      feedId: feed-id
                    status: 0
                    title: Article title
                    summary: Article summary
                    url: https://example.com/article
                    publishedAt: 1781349840000
                    updatedAt: 
                    tagIds: []
                    content: 
                  hasMore: true
        '400':
          description: Invalid id format
      description: System category labels are not stream IDs. Use the category id whose label is !all; category-!all returns 400.
  "/entry/{entryId}":
    get:
      summary: Get entry metadata
      tags:
      - Reading
      parameters:
      - "$ref": "#/components/parameters/ApiVersionHeader"
      - "$ref": "#/components/parameters/EntryId"
      - name: streamId
        in: query
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Entry metadata
          content:
            application/json:
              example:
                result:
                  id: entry-id
                  isSaved: false
                  origin:
                    feedId: feed-id
                  status: 0
                  title: Article title
                  summary: Article summary
                  thumbnail: 
                  url: https://example.com/article
                  publishedAt: 1781349840000
                  crawledAt: 1781350265937
                  timestamp: '1781350265937628978'
                  attachments: []
                  tagIds: []
        '500':
          "$ref": "#/components/responses/InternalServerError"
      description: Missing streamId returned 500 during probing.
  "/entry-contents":
    get:
      summary: Get entry contents
      tags:
      - Reading
      parameters:
      - "$ref": "#/components/parameters/ApiVersionHeader"
      - name: streamId
        in: query
        required: true
        schema:
          type: string
      - name: entryIds
        in: query
        required: true
        style: form
        explode: true
        schema:
          type: array
          items:
            type: string
      responses:
        '200':
          description: Entry contents
          content:
            application/json:
              example:
                result:
                - id: entry-id
                  content: HTML content
        '500':
          "$ref": "#/components/responses/InternalServerError"
      description: entryIds are encoded as repeated query keys. Forms using entryId or feedId returned 500 during probing.
  "/markers/reads":
    put:
